<div class="dashboard-page">
  <div class="container py-5">
    <div class="dashboard-card shadow">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h1 class="mb-1">OptiVision Dashboard</h1>
          <p class="text-muted mb-0">Welcome back, {{ fullName }}</p>
        </div>

        <button class="btn btn-danger" (click)="logout()">Logout</button>
      </div>

      <div class="row g-4">
        <div class="col-md-4">
          <div class="mini-card">
            <h5>Total Patients</h5>
            <p>0</p>
          </div>
        </div>

        <div class="col-md-4">
          <div class="mini-card">
            <h5>Appointments Today</h5>
            <p>0</p>
          </div>
        </div>

        <div class="col-md-4">
          <div class="mini-card">
            <h5>Signed In As</h5>
            <p>{{ email }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
