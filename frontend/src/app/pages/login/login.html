<div class="auth-page">
  <div class="auth-overlay"></div>

  <div class="container auth-wrapper">
    <div class="row justify-content-center align-items-center min-vh-100">
      <div class="col-lg-10">
        <div class="row g-0 auth-card shadow-lg overflow-hidden">
          <div class="col-md-6 auth-left d-none d-md-flex">
            <div class="auth-left-content">
              <h1>Welcome Back</h1>
              <p>
                Sign in to OptiVision Eye Clinic and manage patients and appointments in one place.
              </p>
            </div>
          </div>

          <div class="col-md-6 bg-white">
            <div class="p-5">
              <h2 class="fw-bold mb-2">Login</h2>
              <p class="text-muted mb-4">Sign in to your account</p>

              <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                <div class="mb-3">
                  <label class="form-label">Email Address</label>
                  <input type="email" class="form-control custom-input" formControlName="email" />
                </div>

                <div class="mb-3">
                  <label class="form-label">Password</label>
                  <input type="password" class="form-control custom-input" formControlName="password" />
                </div>

                <button class="btn btn-auth w-100" type="submit" [disabled]="loading">
                  {{ loading ? 'Signing in...' : 'Login' }}
                </button>
              </form>

              <div *ngIf="error" class="alert alert-danger mt-3">
                {{ error }}
              </div>

              <p class="text-center mt-4 mb-0">
                Don’t have an account?
                <a routerLink="/register" class="auth-link">Register</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
