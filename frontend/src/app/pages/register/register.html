<div class="auth-page">
  <div class="auth-overlay"></div>

  <div class="container auth-wrapper">
    <div class="row justify-content-center align-items-center min-vh-100">
      <div class="col-lg-10">
        <div class="row g-0 auth-card shadow-lg overflow-hidden">
          <div class="col-md-6 auth-left d-none d-md-flex">
            <div class="auth-left-content">
              <h1>OptiVision Eye Clinic</h1>
              <p>
                Create your account and access a modern eye clinic management system.
              </p>
            </div>
          </div>

          <div class="col-md-6 bg-white">
            <div class="p-5">
              <h2 class="fw-bold mb-2">Create Account</h2>
              <p class="text-muted mb-4">Register to get started</p>

              <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
                <div class="mb-3">
                  <label class="form-label">Full Name</label>
                  <input type="text" class="form-control custom-input" formControlName="fullName" />
                </div>

                <div class="mb-3">
                  <label class="form-label">Email Address</label>
                  <input type="email" class="form-control custom-input" formControlName="email" />
                </div>

                <div class="mb-3">
                  <label class="form-label">Password</label>
                  <input type="password" class="form-control custom-input" formControlName="password" />
                </div>

                <div class="mb-3">
                  <label class="form-label">Confirm Password</label>
                  <input type="password" class="form-control custom-input" formControlName="confirmPassword" />
                </div>

                <button class="btn btn-auth w-100" type="submit" [disabled]="loading">
                  {{ loading ? 'Creating account...' : 'Register' }}
                </button>
              </form>

              <div *ngIf="message" class="alert alert-success mt-3">
                {{ message }}
              </div>

              <div *ngIf="error" class="alert alert-danger mt-3">
                {{ error }}
              </div>

              <p class="text-center mt-4 mb-0">
                Already have an account?
                <a routerLink="/login" class="auth-link">Login</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
