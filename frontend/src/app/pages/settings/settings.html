<div class="settings-page">
  <div class="page-header">
    <h1>Settings</h1>
    <p>Manage clinic and system preferences.</p>
  </div>

  <div class="card-box">
    <h4>Clinic Settings</h4>

    <form [formGroup]="settingsForm" (ngSubmit)="saveSettings()">
      <div class="setting-row">
        <div>
          <strong>Clinic Name</strong>
          <p>Name displayed in the system.</p>
        </div>

        <input class="form-control" formControlName="clinicName" />
      </div>

      <div class="setting-row">
        <div>
          <strong>Theme</strong>
          <p>Choose application appearance.</p>
        </div>

        <select class="form-control" formControlName="theme">
          <option value="Light">Light</option>
          <option value="Classic">Classic</option>
          <option value="Dark">Dark</option>
        </select>
      </div>

      <div class="setting-row">
        <div>
          <strong>Notifications</strong>
          <p>Enable appointment and system notifications.</p>
        </div>

        <input type="checkbox" formControlName="notifications" />
      </div>

      <button class="btn btn-primary" type="submit">
        Save Settings
      </button>

      <div *ngIf="success" class="alert alert-success mt-3">
        {{ success }}
      </div>
    </form>
  </div>
</div>
